; PlatformIO Project Configuration
; Step 2: STM32F4 CRC peripheral verification firmware
;
; Target: Nucleo-F446RE
; Framework: STM32Cube HAL
; Purpose: Compute CRCs of known test vectors and print them via ST-Link VCP
;          for cross-checking against the Python implementation from Step 1.
 
[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube
 
; ST-Link VCP appears as a serial port at 115200 baud
monitor_speed = 115200
 
; Use the on-board ST-Link for upload (default for this board, listed for clarity)
upload_protocol = stlink
 
; Optimization off for clarity during bring-up; bump to -O2 once stable
build_flags =
    -O0
    -g